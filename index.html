<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Air Drawing Recognizer</title>
    <!--
      Preload the local OpenCV build so the browser starts downloading it
      while React mounts and the worker spawns. By the time the worker
      calls importScripts(), the JS glue and the separate WASM blob are
      already in cache — only the WASM compile time inside the worker
      remains. If the local build isn't present, the worker falls back to
      the CDN; these preloads will be ignored harmlessly in that case.
    -->
    <link rel="preload" as="script" href="/opencv-min.js" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
